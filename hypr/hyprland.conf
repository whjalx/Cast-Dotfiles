########################################
#      Catppuccin Mocha – Hyprland     #
########################################
# ░░ Variables
$mainMod = SUPER
$terminal = kitty
$launcher = wofi --show drun
$browser = firefox
$editor = code

# ░░ Apariencia General
general {
    gaps_in = 5
    gaps_out = 2
    border_size = 1
    col.active_border = rgb(89b4fa)
    col.inactive_border = rgb(45475a)
    layout = dwindle
    allow_tearing = false
}

# ░░ Decoración y efectos
decoration {
    rounding = 12
    blur {
        enabled = true
        size = 7
        passes = 3
        new_optimizations = true
    }

}


# ░░ Animaciones
animations {
    enabled = yes
    bezier = ease, 0.05, 0.9, 0.1, 1.0
    animation = windows, 2, 8, ease
    animation = windowsOut, 2, 10, popin
    animation = windowsMove, 1, 5, ease
    animation = fade, 1, 10, ease
    animation = workspaces, 1, 10, ease
}

# En hyprland.conf

plugin {
    hyprexpo {
        columns = 4               # Cuántas cartas de ancho
        gap_size = 1               # Espacio entre cartas
        bg_col = rgb(111111)       # Color de fondo al hacer el efecto
        workspace_method =center gaps # Método de organización
        enable_gesture = true      # Permite usar gestos de trackpad
        gesture_fingers = 3        # 3 dedos para activar
        gesture_distance = 300     # Sensibilidad
        gesture_positive = false   # Dirección del gesto
    }
}


# ░░ Monitores (ajusta a tu equipo)
# Usa: hyprctl monitors
# Ejemplo laptop:
#monitor=HDMI-A-1,1920x1080@144,0x0,1

# Ajustes de "negro amoled"
monitor=HDMI-A-1,1920x1080@142,0x0,1
monitor=VIRTUAL-1,1920x1080@60,1920x0,1

misc {
    vrr = 0
}
# ░░ Wallpaper (Hyprpaper)
exec-once = hyprpaper

# ░░ Entrada
input {
    kb_layout = us
    kb_options = caps:escape
    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        tap-to-click = yes
    }
}

# ░░ Autostart
exec-once = kill waybar && waybar
exec-once = dunst
exec-once = nm-applet
exec-once = blueman-applet
exec-once = hypridle
exec-once = rudiskie --tray
exec-once = swww-daemon --format xrgb 
exec-once = hyprpm reload -n
exec-once = hyprpm enable hyprexpo && hyprctl reload

# ░░ Atajos
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Space, exec, $launcher
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, exec, $editor
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating
bind = $mainMod, V,exec, hyprctl dispatch resizeactive exact 900 800
bind = $mainMod, M, exit
bind = $mainMod, R, exec, hyprctl reload
bind = $mainMod  SHIFT, R, exec, kill hyprland && hyprland
bind = $mainMod, D, exec, dolphin
bind = $mainMod SHIFT, W, exec, /home/jcast/.config/hypr/chw.sh
bind = $mainMod, W, exec, /home/jcast/.config/hypr/chwf.sh
bind = $mainMod, S, exec, kitty -e joshuto
bind = $mainMod SHIFT, S, exec, flameshot full -p ~/Pictures
bind = $mainMod, L, exec, hyprlock 
bind = $mainMod, T, hyprexpo:expo, toggle # Super + ` (la tecla al lado del 1)

# Cambiar escritorios
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover ventanas entre escritorios
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Mover ventanas flotantes con Super + clic izquierdo
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow



# ░░ Layout dwindle pulido
dwindle {
    preserve_split = yes
}
# ░░ Barra
# (Waybar se configura aparte)
