; ==========================================================
;   Polybar Config - Catppuccin Mocha Style
;   Adaptado de Waybar
; ==========================================================
include-file = /home/jcast/.cache/wal/colors-polybar


[bar/main]
width = 100%
height = 32
radius = 0
fixed-center = true
bottom = false

background = ${colors.color0}
foreground = ${colors.color7}

line-size = 2
line-color = ${colors.blue}

border-size = 4
border-color = ${colors.base}

padding-left = 1
padding-right = 1

module-margin = 1

; Fuentes (Asegúrate de tener Nerd Fonts instaladas)
font-0 = "JetBrainsMono Nerd Font:style=Bold:size=10;3"
font-1 = "Symbols Nerd Font:size=12;3"

; Módulos (Ordenados como en tu Waybar)
modules-left = notification date updates tray
modules-center = bspwm
; Nota: Polybar no tiene "drawer" expandible, así que mostramos el grupo de hardware plano
modules-right = cpu memory temperature sep colorpicker sep bluetooth wlan eth battery 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = bspwm

; ==========================================================
;   MODULES
; ==========================================================

[module/tray]
type = internal/tray
format-margin = 8px
tray-spacing = 8px

[module/bspwm]
type = internal/bspwm
pin-workspaces = true
enable-click = true
enable-scroll = true

; Formato iconos (Círculos como pediste)
ws-icon-0 = 1;
ws-icon-1 = 2;
ws-icon-2 = 3;
ws-icon-3 = 4;
ws-icon-4 = 5;
ws-icon-5 = 6;
ws-icon-6 = 7;
ws-icon-7 = 8;
ws-icon-8 = 9;
ws-icon-9 = 10;
ws-icon-default = 

format = <label-state>

label-focused = %icon%
label-focused-foreground = ${colors.color6}
label-focused-padding = 1

label-occupied = %icon%
label-occupied-foreground = ${colors.color2}
label-occupied-padding = 1

label-urgent = %icon%
label-urgent-foreground = ${colors.red}
label-urgent-padding = 1

label-empty = %icon%
label-empty-foreground = ${colors.surface1}
label-empty-padding = 1

[module/notification]
type = custom/text
content = ""
content-foreground = ${colors.mauve}
click-left = dunstctl history-pop
click-right = dunstctl close-all

[module/date]
type = internal/date
interval = 1
date = %I:%M:%S %p
date-alt = %Y-%m-%d
label = %date%
label-foreground = ${colors.text}

[module/updates]
type = custom/script
exec = checkupdates | wc -l
interval = 600
format-prefix = "󰅢 "
format-prefix-foreground = ${colors.yellow}
label = %output%
click-left = kitty -e sh -c "yay -Syu; echo Done - Press enter to exit; read"

; --- Grupo Hardware (Reemplazo del drawer) ---

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰻠 "
format-prefix-foreground = ${colors.sapphire}
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.sapphire}
label = %percentage_used%%

[module/temperature]
type = internal/temperature
interval = 2
thermal-zone = 0
warn-temperature = 80
format = <ramp> <label>
format-warn = <ramp> <label-warn>
label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.red}
ramp-0 = 
ramp-foreground = ${colors.sapphire}

[module/colorpicker]
type = custom/text
content = ""
content-foreground = ${colors.pink}
; Requiere tener 'gpick' o 'xcolor' instalado en X11
click-left = gpick -pso

; --- Conectividad ---

[module/bluetooth]
type = custom/script
; Necesitas un script externo para esto en Polybar, o usar simplemente un icono estático
exec = echo "󰂯" 
interval = 10
click-left = blueman-manager
format-foreground = ${colors.blue}

[module/wlan]
type = internal/network
interface-type = wireless
interval = 3.0
format-connected = <ramp-signal> <label-connected>
label-connected = %essid%
label-connected-foreground = ${colors.text}
format-disconnected = <label-disconnected>
label-disconnected = 
label-disconnected-foreground = ${colors.overlay0}
ramp-signal-0 = 
ramp-signal-foreground = ${colors.green}
click-left = kitty -e nmtui

[module/eth]
type = internal/network
interface-type = wired
interval = 3.0
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.green}
label-connected = %ifname%
format-disconnected = 
click-left = kitty -e nmtui

[module/battery]
type = internal/battery
full-at = 99
low-at = 20
battery = BAT0
adapter = ADP1
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>

label-charging = %percentage%% 󰂄
label-discharging = %percentage%%
label-full = %percentage%%

ramp-capacity-0 = 󰁻
ramp-capacity-1 = 󰁼
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰂂
ramp-capacity-5 = 󰁹
ramp-capacity-foreground = ${colors.peach}

animation-charging-0 = 󰁻
animation-charging-1 = 󰁾
animation-charging-2 = 󰁹
animation-charging-foreground = ${colors.green}
animation-charging-framerate = 750

[module/sep]
type = custom/text
content = "|"
content-foreground = ${colors.surface2}
content-padding = 1
